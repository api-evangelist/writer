specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Writer
providerId: writer
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- AI
- LLM
- Enterprise
- Content Generation
- Palmyra
- Rate Limiting
- Quotas
- Throttling
description: >-
  Writer enforces RPM (requests per minute) and TPM (tokens per minute) on
  the AI Studio Platform API, with limits tied to the customer's contract
  and configured per organization and per model. The exact per-tier limits
  are not publicly disclosed and are pending reconciliation.
notes: >-
  Documentation references RPM and TPM limits; specific values are
  contract-dependent. Verify in the dev.writer.com rate-limit guide for
  the active organization.
sources:
- https://dev.writer.com/api-guides/rate-limits
- https://writer.com/pricing/
responseCodes:
  throttled: 429
limits:
- name: Requests Per Minute (RPM)
  scope: organization
  metric: requests
  limit: see provider documentation
  notes: Per-model RPM, varies by contract and model. Pending reconciliation.
- name: Tokens Per Minute (TPM)
  scope: organization
  metric: tokens
  limit: see provider documentation
  notes: Per-model TPM, varies by contract and model. Pending reconciliation.
- name: Concurrent Requests
  scope: organization
  metric: concurrent
  limit: see provider documentation
  notes: Concurrency cap per model. Pending reconciliation.
policies:
- name: Tiered Limits
  description: Higher limits unlocked through Enterprise contract size.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
