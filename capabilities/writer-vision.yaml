naftiko: 1.0.0-alpha2
info:
  label: API — Vision
  description: 'API — Vision. 1 operations. Lead operation: Analyze images. Self-contained Naftiko capability covering one
    Writer business surface.'
  tags:
  - Writer
  - Vision
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WRITER_API_KEY: WRITER_API_KEY
capability:
  consumes:
  - type: http
    namespace: writer-vision
    baseUri: https://api.writer.com
    description: API — Vision business capability. Self-contained, no shared references.
    resources:
    - name: v1-vision
      path: /v1/vision
      operations:
      - name: post
        method: POST
        description: Analyze images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WRITER_API_KEY}}'
  exposes:
  - type: rest
    namespace: writer-vision-rest
    port: 8080
    description: REST adapter for API — Vision. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/vision
      name: v1-vision
      description: REST surface for v1-vision.
      operations:
      - method: POST
        name: post
        description: Analyze images
        call: writer-vision.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: writer-vision-mcp
    port: 9090
    transport: http
    description: MCP adapter for API — Vision. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: analyze-images
      description: Analyze images
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: writer-vision.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
