specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Writer
providerId: writer
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- LLM
- Enterprise
- Content Generation
- Palmyra
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Writer spend. Writer combines a per-seat / per-contract
  Enterprise subscription for the WRITER Agent / AI HQ product with usage
  metering on the AI Studio Platform API (token-based per Palmyra model,
  Knowledge Graph queries, vision calls, file storage). Most enterprise
  contracts bundle a token allotment with overage rates negotiated per
  contract.
notes: >-
  Public per-seat and per-token rates are not disclosed; reconciliation of
  exact rates requires the customer's enterprise contract. Treat both
  Subscription (seats) and Usage (tokens / KG queries) as charge categories.
sources:
- https://writer.com/pricing/
- https://dev.writer.com/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Writer
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Writer AI Studio
  ServiceCategory: AI and Machine Learning
  ProviderName: Writer
  PublisherName: Writer
  InvoiceIssuerName: Writer
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: enterprise_seats
  description: Per-seat enterprise subscription for WRITER Agent / AI HQ.
  unit: seat_months
  aggregation: sum
  dimensions:
  - organization
  - department
- name: input_tokens
  description: Tokens sent in chat / completion / vision requests against the AI Studio API.
  unit: tokens
  aggregation: sum
  dimensions:
  - organization
  - model
  - api
- name: output_tokens
  description: Tokens generated by Palmyra models per request.
  unit: tokens
  aggregation: sum
  dimensions:
  - organization
  - model
  - api
- name: knowledge_graph_queries
  description: Retrieval calls against Knowledge Graph indexes.
  unit: queries
  aggregation: sum
  dimensions:
  - organization
  - graph
- name: vision_calls
  description: Vision/document analysis calls.
  unit: calls
  aggregation: sum
  dimensions:
  - organization
  - model
- name: web_search_calls
  description: Web search invocations.
  unit: calls
  aggregation: sum
  dimensions:
  - organization
- name: translation_characters
  description: Translation characters processed.
  unit: characters
  aggregation: sum
  dimensions:
  - organization
- name: file_storage_gib
  description: File storage attached to Knowledge Graphs / Applications.
  unit: gib_months
  aggregation: sum
  dimensions:
  - organization
principles:
- name: Visibility
  description: Pull AI Studio usage analytics from the Writer console; reconcile against enterprise invoices.
- name: Allocation
  description: Tag API keys per department / Application; map to internal cost centers.
- name: Optimization
  description: Cache repeated prompts in Knowledge Graph; right-size context windows; consolidate Playbooks; turn off unused Applications.
- name: Accountability
  description: Assign contract owner per organization; review monthly seats and token burn against committed contract.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
